<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>誰當老闆誰收錢 - 3D 森林立體版</title>
    
    <!-- 引入 Tailwind CSS (UI) -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- 引入 Lucide Icons (圖示) -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <!-- 引入 Three.js (3D 引擎) -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <!-- 引入 OrbitControls (視角控制) -->
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>

    <style>
        body { margin: 0; overflow: hidden; background-color: #2bb1b0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; cursor: grab; }
        body:active { cursor: grabbing; }
        .lucide { width: 18px; height: 18px; stroke-width: 2.5; }
        
        /* 隱藏原生滾動條 */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(0,0,0,0.2); border-radius: 10px; }

        /* 骰子按壓效果 */
        .btn-press:active { transform: translateY(4px) scale(0.95); box-shadow: 0 0px 0px rgba(0,0,0,0); }
        
        /* 毛玻璃 UI 效果 */
        .glass-panel {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.5);
            box-shadow: 0 8px 32px 0 rgba(0, 100, 100, 0.1);
        }
    </style>
</head>
<body class="text-slate-800">

    <!-- 3D Canvas 容器 (鋪滿背景) -->
    <div id="webgl-container" class="absolute inset-0 z-0"></div>

    <!-- UI 前景層 -->
    <div class="absolute inset-0 z-10 pointer-events-none flex flex-col justify-between p-4 md:p-8">
        
        <!-- 頂部標題與狀態 -->
        <div class="flex flex-col md:flex-row justify-between items-start md:items-center gap-4">
            <h1 class="text-2xl md:text-4xl font-extrabold text-white drop-shadow-md tracking-wider flex items-center gap-2">
                <i data-lucide="box" class="w-8 h-8 text-white"></i> 森林商戰 3D
            </h1>
            
            <!-- 玩家狀態卡片 -->
            <div class="flex gap-4 w-full md:w-auto pointer-events-auto">
                <!-- 玩家一 -->
                <div id="player0-card" class="glass-panel rounded-2xl p-3 flex-1 md:w-48 transition-all duration-300 border-2 border-blue-400 transform scale-105">
                    <div class="flex justify-between items-center mb-1">
                        <h2 class="font-bold text-blue-700 flex items-center gap-1"><span class="w-3 h-3 bg-blue-500 inline-block rounded-sm"></span> 影狼</h2>
                        <span id="player0-role" class="text-[10px] px-2 py-0.5 rounded-full bg-blue-100 text-blue-800 font-bold border border-blue-200">上班族</span>
                    </div>
                    <p id="player0-money" class="text-xl font-black text-slate-800">$1,000,000</p>
                </div>
                <!-- 玩家二 -->
                <div id="player1-card" class="glass-panel rounded-2xl p-3 flex-1 md:w-48 transition-all duration-300 border-2 border-transparent opacity-80">
                    <div class="flex justify-between items-center mb-1">
                        <h2 class="font-bold text-rose-600 flex items-center gap-1"><span class="w-3 h-3 bg-rose-500 inline-block rounded-sm"></span> 夜貓</h2>
                        <span id="player1-role" class="text-[10px] px-2 py-0.5 rounded-full bg-rose-100 text-rose-800 font-bold border border-rose-200">上班族</span>
                    </div>
                    <p id="player1-money" class="text-xl font-black text-slate-800">$1,000,000</p>
                </div>
            </div>
        </div>

        <!-- 底部控制區 -->
        <div class="flex flex-col md:flex-row justify-between items-end gap-4 pointer-events-none">
            
            <!-- 遊戲紀錄區 -->
            <div class="glass-panel rounded-2xl w-full md:w-80 h-40 flex flex-col p-3 pointer-events-auto">
                <h3 class="font-bold text-teal-800 text-sm flex items-center gap-1 mb-2 border-b border-teal-200/50 pb-1 flex-shrink-0">
                    <i data-lucide="scrollText"></i> 遊戲紀錄
                </h3>
                <div id="logs-container" class="flex-1 overflow-y-auto flex flex-col gap-1 pr-1 text-xs md:text-sm">
                    <!-- Logs generated by JS -->
                </div>
            </div>

            <!-- 骰子按鈕 -->
            <div class="flex flex-col items-center pointer-events-auto">
                <div id="turn-indicator" class="bg-blue-500 text-white px-4 py-1 rounded-full text-sm font-bold shadow-lg mb-3 animate-bounce">
                    輪到 影狼 回合
                </div>
                <button id="dice-btn" onclick="handleRollDice()" class="w-20 h-20 md:w-24 md:h-24 bg-white rounded-3xl shadow-[0_8px_0_#cbd5e1,0_15px_20px_rgba(0,0,0,0.2)] border-2 border-slate-100 text-4xl font-black text-slate-700 flex items-center justify-center transition-all btn-press hover:bg-slate-50">
                    🎲
                </button>
            </div>
            
        </div>
        
        <!-- 操作提示 -->
        <div class="absolute bottom-4 left-1/2 -translate-x-1/2 text-white/60 text-xs pointer-events-none drop-shadow-md font-bold hidden md:block">
            拖曳旋轉視角 • 滾輪縮放
        </div>
    </div>

    <script>
        // ==========================================
        // 1. 遊戲邏輯與資料
        // ==========================================
        const BOARD_TILES = [
            { id: 0, name: 'START', label: '總部', type: 'start' },
            { id: 1, name: '建築師', label: '職業', type: 'profession' },
            { id: 2, name: '我是企業家', label: '身分', type: 'role_boss' },
            { id: 3, name: '金銀珠寶', label: '每點1萬', type: 'company', cost: 10000 },
            { id: 4, name: '我是上班族', label: '身分', type: 'role_employee' },
            { id: 5, name: '銷貨收入', label: '+5萬', type: 'sale' },
            { id: 6, name: '財經新聞', label: '機會', type: 'news' },
            { id: 7, name: '保險公司', label: '保險', type: 'company', cost: 1000 },
            { id: 8, name: '會計師', label: '職業', type: 'profession' },
            { id: 9, name: '我是企業家', label: '身分', type: 'role_boss' },
            { id: 10, name: '五星級飯店', label: '每點3千', type: 'company', cost: 3000 },
            { id: 11, name: '我是上班族', label: '身分', type: 'role_employee' },
            { id: 12, name: '計程車', label: '交通', type: 'taxi' },
            { id: 13, name: '財經新聞', label: '機會', type: 'news' },
            { id: 14, name: '政府', label: '稅收', type: 'gov' },
            { id: 15, name: '律師', label: '職業', type: 'profession' },
            { id: 16, name: '我是企業家', label: '身分', type: 'role_boss' },
            { id: 17, name: '航空公司', label: '每點5千', type: 'company', cost: 5000 },
            { id: 18, name: '我是上班族', label: '身分', type: 'role_employee' },
            { id: 19, name: '銷貨收入', label: '+5萬', type: 'sale' },
            { id: 20, name: '財經新聞', label: '機會', type: 'news' },
            { id: 21, name: '證券交易所', label: '投資', type: 'company', cost: 10000 },
            { id: 22, name: '醫生', label: '職業', type: 'profession' },
            { id: 23, name: '我是企業家', label: '身分', type: 'role_boss' },
            { id: 24, name: '百貨公司', label: '每點2千', type: 'company', cost: 2000 },
            { id: 25, name: '我是上班族', label: '身分', type: 'role_employee' },
            { id: 26, name: '購貨支出', label: '-3萬', type: 'purchase' },
            { id: 27, name: '財經新聞', label: '機會', type: 'news' },
        ];

        const NEWS_CARDS = [
            { text: "發現秘銀礦脈！獲得現金 80,000 元", value: 80000 },
            { text: "遭遇森林盜賊，損失 50,000 元", value: -50000 },
            { text: "投資木材工廠分紅，獲得 30,000 元", value: 30000 },
            { text: "破壞環境罰款，繳交 10,000 元", value: -10000 },
            { text: "挖到古老寶箱！獲得現金 100,000 元", value: 100000 },
        ];

        let players = [
            { id: 0, name: "影狼", pos: 0, money: 1000000, role: "上班族", color: 0x3b82f6 },
            { id: 1, name: "夜貓", pos: 0, money: 1000000, role: "上班族", color: 0xf43f5e }
        ];
        let turn = 0;
        let isAnimating = false; 
        let logs = ["🎲 歡迎來到 3D 陽光大都會！人物將從左邊出發。<br>雙方獲得 1,000,000 啟動資金。"];
        let clouds = []; // ⭐ 新增：儲存雲朵陣列以便動畫控制

        const pathCoords = [];
        // ⭐ 修改路徑順序：讓起點位於最下方角落，並優先往左邊移動
        for(let i=7; i>=0; i--) pathCoords.push({x: i, z: 7});    // 0-7: 從最底端往左走
        for(let i=6; i>=0; i--) pathCoords.push({x: 0, z: i});    // 8-14: 從左側往頂端走
        for(let i=1; i<=7; i++) pathCoords.push({x: i, z: 0});    // 15-21: 從頂端往右走
        for(let i=1; i<=6; i++) pathCoords.push({x: 7, z: i});    // 22-27: 從右側回到底端

        // ==========================================
        // 2. Three.js 3D 引擎設置與精緻模型生成
        // ==========================================
        let scene, camera, renderer, controls;
        let playerMeshes = [];
        
        // ⭐ 將地圖方塊尺寸再次加倍！從 1.6 變成 3.2
        const TILE_SIZE = 3.2; 
        const OFFSET = -11.2; // 重新計算置中偏移 ( -3.5 * 3.2 = -11.2 )

        // 預設共用材質 (調色盤)
        const materials = {
            grass: new THREE.MeshLambertMaterial({ color: 0x8bd054 }),
            dirt: new THREE.MeshLambertMaterial({ color: 0x795548 }),
            stone: new THREE.MeshLambertMaterial({ color: 0xe2e8f0 }),
            red: new THREE.MeshLambertMaterial({ color: 0xef4444 }),
            darkRed: new THREE.MeshLambertMaterial({ color: 0xb91c1c }),
            blue: new THREE.MeshLambertMaterial({ color: 0x3b82f6 }),
            cyan: new THREE.MeshLambertMaterial({ color: 0x06b6d4 }),
            gold: new THREE.MeshLambertMaterial({ color: 0xf59e0b }),
            purple: new THREE.MeshLambertMaterial({ color: 0x8b5cf6 }),
            magenta: new THREE.MeshLambertMaterial({ color: 0xd946ef }),
            pink: new THREE.MeshLambertMaterial({ color: 0xf472b6 }),
            yellow: new THREE.MeshLambertMaterial({ color: 0xfacc15 }),
            green: new THREE.MeshLambertMaterial({ color: 0x22c55e }),
            gray: new THREE.MeshLambertMaterial({ color: 0x64748b }),
            darkGray: new THREE.MeshLambertMaterial({ color: 0x334155 }),
            brown: new THREE.MeshLambertMaterial({ color: 0xa16207 }),
            black: new THREE.MeshLambertMaterial({ color: 0x1e293b }),
            portal: new THREE.MeshBasicMaterial({ color: 0xffffff }),
            asphalt: new THREE.MeshLambertMaterial({ color: 0x334155 }), // ⭐ 柏油路
            sidewalk: new THREE.MeshLambertMaterial({ color: 0x94a3b8 }), // ⭐ 人行道
            cloud: new THREE.MeshLambertMaterial({ color: 0xffffff, transparent: true, opacity: 0.9 }) // ⭐ 雲朵
        };

        function getCameraZoom(aspect) {
            // 因為軌道變大了兩倍，鏡頭也需要拉遠兩倍以上
            return aspect < 1 ? 29 / aspect : 23; 
        }

        function init3D() {
            const container = document.getElementById('webgl-container');
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x2bb1b0);

            const aspect = window.innerWidth / window.innerHeight;
            const d = getCameraZoom(aspect); 
            camera = new THREE.OrthographicCamera(-d * aspect, d * aspect, d, -d, 1, 1000);
            camera.position.set(40, 50, 40);
            camera.lookAt(0, 0, 0);

            renderer = new THREE.WebGLRenderer({ antialias: true });
            // 根據裝置螢幕真實解析度渲染，解決高畫質螢幕的模糊問題
            renderer.setPixelRatio(window.devicePixelRatio);
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.shadowMap.enabled = true;
            renderer.shadowMap.type = THREE.PCFSoftShadowMap;
            container.appendChild(renderer.domElement);

            controls = new THREE.OrbitControls(camera, renderer.domElement);
            controls.enableDamping = true; 
            controls.dampingFactor = 0.05;
            controls.maxPolarAngle = Math.PI / 2.2; 
            controls.minZoom = 0.5; 
            controls.maxZoom = 2.5; 

            // 燈光設置
            const ambientLight = new THREE.AmbientLight(0xffffff, 0.6); 
            scene.add(ambientLight);

            const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
            dirLight.position.set(10, 20, -10);
            dirLight.castShadow = true;
            dirLight.shadow.mapSize.width = 2048;
            dirLight.shadow.mapSize.height = 2048;
            dirLight.shadow.camera.left = -30;
            dirLight.shadow.camera.right = 30;
            dirLight.shadow.camera.top = 30;
            dirLight.shadow.camera.bottom = -30;
            scene.add(dirLight);

            const fillLight = new THREE.DirectionalLight(0xaaddff, 0.4);
            fillLight.position.set(-20, 20, 20);
            scene.add(fillLight);

            createWorld();
            createPlayers();

            window.addEventListener('resize', onWindowResize, false);
            animate();
        }

        function createMesh(geometry, material, x, y, z) {
            const mesh = new THREE.Mesh(geometry, material);
            mesh.position.set(x, y, z);
            mesh.castShadow = true;
            mesh.receiveShadow = true;
            return mesh;
        }

        // 建造專屬模型 (包含內側位移)
        function buildCustomStructure(tile, parentMesh, bx, bz) {
            const TOP = TILE_SIZE / 2; // 地板的高度
            const group = new THREE.Group();
            
            // 將所有建築物移至方塊的「內側」，讓出極寬敞的外側通道
            group.position.set(bx, TOP, bz);
            
            // ⭐ 建築物等比例放大 1.4 倍，以免在大軌道上顯得太小
            group.scale.set(1.4, 1.4, 1.4); 

            const box = (w, h, d, mat, yOff=0) => createMesh(new THREE.BoxGeometry(w, h, d), mat, 0, h/2 + yOff, 0);
            const cyl = (rt, rb, h, s, mat, yOff=0) => createMesh(new THREE.CylinderGeometry(rt, rb, h, s), mat, 0, h/2 + yOff, 0);

            switch(tile.name) {
                case 'START':
                    group.add(box(0.9, 0.2, 0.9, materials.red));
                    group.add(box(0.5, 0.8, 0.5, materials.stone, 0.2));
                    group.add(cyl(0, 0.4, 0.4, 4, materials.red, 1.0).rotateY(Math.PI/4));
                    break;
                case '金銀珠寶':
                    const gem = createMesh(new THREE.OctahedronGeometry(0.35), materials.gold, 0, 0.6, 0);
                    gem.name = "floatingGem"; 
                    group.add(gem);
                    group.add(cyl(0.2, 0.3, 0.2, 8, materials.gray));
                    break;
                case '五星級飯店':
                    group.add(box(0.6, 1.2, 0.6, materials.purple));
                    group.add(box(0.4, 0.2, 0.4, materials.gold, 1.2));
                    break;
                case '航空公司':
                    group.add(box(0.4, 0.8, 0.4, materials.stone));
                    group.add(box(0.8, 0.15, 0.3, materials.cyan, 0.8));
                    break;
                case '百貨公司':
                    group.add(box(0.8, 0.5, 0.8, materials.pink));
                    group.add(box(0.6, 0.3, 0.6, materials.stone, 0.5));
                    break;
                case '保險公司':
                    group.add(box(0.7, 0.8, 0.7, materials.blue));
                    group.add(box(0.8, 0.6, 0.2, materials.cyan, 0.1));
                    break;
                case '證券交易所':
                    group.add(box(0.7, 0.6, 0.7, materials.darkGray));
                    const trend = box(0.1, 0.6, 0.1, materials.green);
                    trend.position.set(0.4, 0.3, 0);
                    trend.rotation.z = -Math.PI / 6;
                    group.add(trend);
                    break;
                case '財經新聞':
                    const archGeo = new THREE.BoxGeometry(0.8, 1.0, 0.2);
                    const arch = new THREE.Mesh(archGeo, materials.portal);
                    arch.position.set(0, 0.5, 0);
                    group.add(arch);
                    const pLight = new THREE.PointLight(0xffffff, 0.5, 3);
                    pLight.position.set(0, 0.5, 0);
                    group.add(pLight);
                    break;
                case '醫生':
                    group.add(box(0.6, 0.5, 0.6, materials.stone));
                    const cross1 = box(0.3, 0.1, 0.62, materials.red, 0.2);
                    const cross2 = box(0.1, 0.3, 0.62, materials.red, 0.1);
                    group.add(cross1, cross2);
                    break;
                case '律師':
                    group.add(box(0.5, 0.1, 0.5, materials.gray)); 
                    group.add(box(0.05, 0.6, 0.05, materials.gray, 0.1)); 
                    group.add(box(0.6, 0.05, 0.05, materials.gray, 0.65)); 
                    group.add(cyl(0.15, 0.15, 0.05, 16, materials.gold, 0.5).translateX(-0.3));
                    group.add(cyl(0.15, 0.15, 0.05, 16, materials.gold, 0.5).translateX(0.3));
                    break;
                case '建築師':
                    group.add(box(0.5, 0.4, 0.5, materials.brown));
                    const roof = cyl(0.45, 0.45, 0.5, 4, materials.yellow, 0.4);
                    roof.rotation.y = Math.PI / 4;
                    group.add(roof);
                    break;
                case '會計師':
                    group.add(box(0.6, 0.1, 0.5, materials.darkGray));
                    const screen = box(0.4, 0.05, 0.15, materials.green, 0.1);
                    screen.position.z = -0.1;
                    group.add(screen);
                    group.add(box(0.1, 0.05, 0.1, materials.red, 0.1).translateZ(0.1).translateX(-0.15));
                    group.add(box(0.1, 0.05, 0.1, materials.yellow, 0.1).translateZ(0.1).translateX(0.15));
                    break;
                case '我是企業家':
                    const crown = cyl(0.2, 0.3, 0.4, 6, materials.magenta);
                    crown.position.y = 0.2;
                    group.add(crown);
                    break;
                case '我是上班族':
                    group.add(box(0.5, 0.3, 0.3, materials.brown));
                    const pc = box(0.2, 0.25, 0.05, materials.black, 0.3);
                    pc.position.z = -0.05;
                    group.add(pc);
                    break;
                case '政府':
                    group.add(box(0.7, 0.4, 0.7, materials.stone));
                    const dome = createMesh(new THREE.SphereGeometry(0.35, 16, 16, 0, Math.PI*2, 0, Math.PI/2), materials.gray, 0, 0.4, 0);
                    group.add(dome);
                    break;
                case '計程車':
                    group.add(box(0.6, 0.25, 0.3, materials.yellow));
                    group.add(box(0.3, 0.2, 0.25, materials.black, 0.25));
                    break;
                case '銷貨收入':
                    group.add(box(0.6, 0.3, 0.6, materials.green));
                    const coin = cyl(0.2, 0.2, 0.05, 16, materials.gold, 0.3);
                    coin.rotation.x = Math.PI / 2;
                    coin.name = "floatingGem"; 
                    group.add(coin);
                    break;
                case '購貨支出':
                    group.add(box(0.4, 0.5, 0.3, materials.red));
                    group.add(box(0.05, 0.2, 0.05, materials.stone, 0.5).translateX(-0.1));
                    group.add(box(0.05, 0.2, 0.05, materials.stone, 0.5).translateX(0.1));
                    group.add(box(0.25, 0.05, 0.05, materials.stone, 0.7));
                    break;
            }

            group.traverse(child => {
                if (child.isMesh) {
                    child.castShadow = true;
                    child.receiveShadow = true;
                }
            });

            parentMesh.add(group);
        }

        function createWorld() {
            // ⭐ 1. 跑道換成柏油路面
            const blockMaterials = [
                materials.stone, materials.stone, 
                materials.asphalt, materials.stone, // 上方為柏油路面
                materials.stone, materials.stone  
            ];

            const boxGeo = new THREE.BoxGeometry(TILE_SIZE, TILE_SIZE, TILE_SIZE);

            BOARD_TILES.forEach((tile, index) => {
                const coord = pathCoords[index];
                const px = coord.x * TILE_SIZE + OFFSET;
                const pz = coord.z * TILE_SIZE + OFFSET;

                let mesh;
                if (tile.type === 'start') {
                    mesh = new THREE.Mesh(boxGeo, materials.stone); 
                    mesh.position.set(px, 0, pz);
                } else {
                    mesh = new THREE.Mesh(boxGeo, blockMaterials);
                    mesh.position.set(px, 0, pz);
                }

                mesh.castShadow = true;
                mesh.receiveShadow = true;
                
                let bx = 0, bz = 0;
                const shiftInner = 0.9; 
                if (coord.z === 0) bz = shiftInner; 
                if (coord.z === 7) bz = -shiftInner;  
                if (coord.x === 0) bx = shiftInner; 
                if (coord.x === 7) bx = -shiftInner;  

                buildCustomStructure(tile, mesh, bx, bz);
                scene.add(mesh);
            });

            // ⭐ 2. 中間小島換成「城市群」
            const innerBlockMaterials = [
                materials.stone, materials.stone,
                materials.sidewalk, materials.stone, // 上方為人行道/水泥地
                materials.stone, materials.stone
            ];

            for (let i = 1; i <= 6; i++) {
                for (let j = 1; j <= 6; j++) {
                    const px = i * TILE_SIZE + OFFSET;
                    const pz = j * TILE_SIZE + OFFSET;
                    
                    // 城市地基保持平整
                    const innerMesh = new THREE.Mesh(boxGeo, innerBlockMaterials);
                    innerMesh.position.set(px, 0, pz);
                    innerMesh.castShadow = true;
                    innerMesh.receiveShadow = true;
                    scene.add(innerMesh);

                    // 在中間隨機蓋大樓 (每格 1~2 棟)
                    const bldgCount = Math.floor(Math.random() * 2) + 1; 
                    for (let t = 0; t < bldgCount; t++) {
                        const bldgGroup = new THREE.Group();
                        
                        const bw = 1.0 + Math.random() * 1.5;
                        const bh = 2.0 + Math.random() * 6.0; // 摩天大樓高度
                        const bd = 1.0 + Math.random() * 1.5;
                        
                        const bldgMat = [materials.gray, materials.darkGray, materials.blue, materials.stone][Math.floor(Math.random()*4)];
                        const bldgBody = createMesh(new THREE.BoxGeometry(bw, bh, bd), bldgMat, 0, bh/2, 0);
                        bldgGroup.add(bldgBody);
                        
                        // 頂樓水塔或天台裝飾
                        if(Math.random() > 0.5) {
                            const roof = createMesh(new THREE.BoxGeometry(bw*0.5, 0.4, bd*0.5), materials.stone, 0, bh + 0.2, 0);
                            bldgGroup.add(roof);
                        }
                        
                        const tx = px + (Math.random() - 0.5) * (TILE_SIZE * 0.4);
                        const tz = pz + (Math.random() - 0.5) * (TILE_SIZE * 0.4);
                        const ty = (TILE_SIZE / 2); 
                        
                        bldgGroup.position.set(tx, ty, tz);
                        scene.add(bldgGroup);
                    }
                }
            }

            // ⭐ 3. 外圍的樹木換成「雲朵」
            const cloudGeo = new THREE.BoxGeometry(1, 1, 1); // 使用方塊組合成像素雲
            clouds = []; // 清空雲朵陣列

            for(let i=0; i<30; i++) {
                const rx = (Math.random() - 0.5) * 80;
                const rz = (Math.random() - 0.5) * 80;
                
                // 避開中央區域
                if (Math.abs(rx) > TILE_SIZE * 4.5 || Math.abs(rz) > TILE_SIZE * 4.5) {
                    const cloudGroup = new THREE.Group();
                    
                    // 用多個方塊疊加成一朵雲
                    const c1 = createMesh(cloudGeo, materials.cloud, 0, 0, 0);
                    c1.scale.set(3, 1.5, 2);
                    const c2 = createMesh(cloudGeo, materials.cloud, 1.2, 0.5, 0.5);
                    c2.scale.set(2, 1.5, 1.5);
                    const c3 = createMesh(cloudGeo, materials.cloud, -1.2, -0.2, -0.5);
                    c3.scale.set(2.5, 1.2, 1.5);
                    const c4 = createMesh(cloudGeo, materials.cloud, 0, 0.8, -0.5);
                    c4.scale.set(2, 1.5, 1.5);
                    
                    // 讓雲不會產生陰影，保持輕盈感
                    c1.castShadow = false; c2.castShadow = false; c3.castShadow = false; c4.castShadow = false;
                    
                    cloudGroup.add(c1, c2, c3, c4);
                    
                    // 隨機大小與高度
                    const scale = 1 + Math.random() * 1.5;
                    cloudGroup.scale.set(scale, scale, scale);
                    const ry = 8 + Math.random() * 12; // 漂浮在半空中
                    
                    cloudGroup.position.set(rx, ry, rz);
                    scene.add(cloudGroup);
                    clouds.push(cloudGroup);
                }
            }
        }

        // ⭐ 防穿模機制再進化：將玩家推向極寬敞的「外側」
        function getPlayerPos(tileIndex, playerIndex) {
            const c = pathCoords[tileIndex];
            const px = c.x * TILE_SIZE + OFFSET;
            const pz = c.z * TILE_SIZE + OFFSET;

            // 1. 將玩家推向軌道的最「外側」
            let outX = 0, outZ = 0;
            const shiftOut = 0.9; 
            if (c.z === 0) outZ = -shiftOut; 
            if (c.z === 7) outZ = shiftOut;  
            if (c.x === 0) outX = -shiftOut; 
            if (c.x === 7) outX = shiftOut;  

            // 2. 拉大玩家之間的並肩距離，確保不會擠在一起
            let pOffsetX = 0, pOffsetZ = 0;
            if (c.z === 0 || c.z === 7) {
                pOffsetX = playerIndex === 0 ? -0.45 : 0.45;
            } else {
                pOffsetZ = playerIndex === 0 ? -0.45 : 0.45;
            }

            return {
                x: px + outX + pOffsetX,
                z: pz + outZ + pOffsetZ
            };
        }

        // ⭐ 新增：建立由多個方塊組成的小人物模型
        function createCharacter(playerColor) {
            const group = new THREE.Group();

            const skinMat = new THREE.MeshLambertMaterial({ color: 0xffe0bd }); // 皮膚色
            const shirtMat = new THREE.MeshLambertMaterial({ color: playerColor }); // 玩家代表色衣服
            const pantsMat = new THREE.MeshLambertMaterial({ color: 0x334155 }); // 深灰褲子

            const box = (w, h, d, mat, x, y, z) => {
                const mesh = new THREE.Mesh(new THREE.BoxGeometry(w, h, d), mat);
                mesh.position.set(x, y, z);
                mesh.castShadow = true;
                mesh.receiveShadow = true;
                return mesh;
            };

            // 頭、身體、四肢 (以 y=0 為腳底板)
            group.add(box(0.4, 0.4, 0.4, skinMat, 0, 1.0, 0)); // 頭
            group.add(box(0.5, 0.4, 0.3, shirtMat, 0, 0.6, 0)); // 身體
            group.add(box(0.15, 0.4, 0.15, skinMat, -0.325, 0.6, 0)); // 左手
            group.add(box(0.15, 0.4, 0.15, skinMat, 0.325, 0.6, 0)); // 右手
            group.add(box(0.2, 0.4, 0.2, pantsMat, -0.15, 0.2, 0)); // 左腳
            group.add(box(0.2, 0.4, 0.2, pantsMat, 0.15, 0.2, 0)); // 右腳

            // 稍微放大一點點，讓小人物在軌道上更明顯
            group.scale.set(1.2, 1.2, 1.2);

            return group;
        }

        function createPlayers() {
            players.forEach((p, idx) => {
                // ⭐ 使用新的小人物模型取代單一方塊
                const mesh = createCharacter(p.color);
                
                // 呼叫防穿模計算取得初始位置
                const pos = getPlayerPos(0, idx);
                // 腳底剛好對齊地板高度 (TILE_SIZE / 2)
                mesh.position.set(pos.x, TILE_SIZE/2, pos.z);
                
                scene.add(mesh);
                playerMeshes.push(mesh);
            });
        }

        function onWindowResize() {
            const aspect = window.innerWidth / window.innerHeight;
            const d = getCameraZoom(aspect);
            camera.left = -d * aspect;
            camera.right = d * aspect;
            camera.top = d;
            camera.bottom = -d;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        // ==========================================
        // 3. UI 與 遊戲互動邏輯
        // ==========================================
        function handleRollDice() {
            if (isAnimating) return; 
            isAnimating = true;
            
            const btn = document.getElementById('dice-btn');
            btn.innerHTML = '...';
            btn.classList.add('animate-pulse');

            setTimeout(() => {
                const dice = Math.floor(Math.random() * 6) + 1;
                btn.innerHTML = dice;
                btn.classList.remove('animate-pulse');
                
                startPlayerMovement(dice);
            }, 600);
        }

        function startPlayerMovement(dice) {
            const currentPlayer = players[turn];
            const mesh = playerMeshes[turn];
            const startIndex = currentPlayer.pos;
            const targetIndex = (startIndex + dice) % 28;
            
            let currentStep = 0;
            
            const hopInterval = setInterval(() => {
                currentStep++;
                const nextTileIdx = (startIndex + currentStep) % 28;
                
                // 取得這格的安全站位，避免撞到大樓
                const pos = getPlayerPos(nextTileIdx, turn);
                
                animateHop(mesh, pos.x, pos.z, 300, () => {
                    if (currentStep === dice) {
                        clearInterval(hopInterval);
                        executeTurn(dice, targetIndex);
                    }
                });
            }, 350); 
        }

        function animateHop(mesh, endX, endZ, duration, onComplete) {
            const startX = mesh.position.x;
            const startZ = mesh.position.z;
            const startY = mesh.position.y;
            const startTime = performance.now();

            function updateHop(currentTime) {
                const elapsed = currentTime - startTime;
                const progress = Math.min(elapsed / duration, 1);
                
                mesh.position.x = startX + (endX - startX) * progress;
                mesh.position.z = startZ + (endZ - startZ) * progress;
                // ⭐ 因為大軌道距離變長，跳躍的高度也跟著調高至 2.5
                mesh.position.y = startY + Math.sin(progress * Math.PI) * 2.5;
                // ⭐ 讓小人物在空中完美轉一圈 (360度 = 2 * PI)
                mesh.rotation.y = progress * Math.PI * 2;

                if (progress < 1) {
                    requestAnimationFrame(updateHop);
                } else {
                    mesh.position.y = startY; 
                    mesh.rotation.y = 0;
                    if(onComplete) onComplete();
                }
            }
            requestAnimationFrame(updateHop);
        }

        function executeTurn(dice, targetPos) {
            const currentPlayer = players[turn];
            const tile = BOARD_TILES[targetPos];
            
            let newMoney = currentPlayer.money;
            let newRole = currentPlayer.role;
            let actionMsg = "";

            switch (tile.type) {
                case 'company':
                    const cost = tile.cost * dice;
                    newMoney -= cost;
                    actionMsg = `抵達 ${tile.name}，支付 ${cost.toLocaleString()} 元`;
                    break;
                case 'role_boss':
                    newRole = '企業家';
                    actionMsg = `戴上皇冠！身分轉為【企業家】💼`;
                    break;
                case 'role_employee':
                    newRole = '上班族';
                    actionMsg = `回到座位，身分降為【上班族】💻`;
                    break;
                case 'gov':
                    const tax = currentPlayer.role === '企業家' ? 10000 * dice : 1000 * dice;
                    newMoney -= tax;
                    actionMsg = `繳交政府稅金 ${tax.toLocaleString()} 元`;
                    break;
                case 'sale':
                    newMoney += 50000;
                    actionMsg = `獲得大金幣！銷貨進帳 50,000 元`;
                    break;
                case 'purchase':
                    newMoney -= 30000;
                    actionMsg = `紅袋子購物支出 30,000 元`;
                    break;
                case 'news':
                    const news = NEWS_CARDS[Math.floor(Math.random() * NEWS_CARDS.length)];
                    newMoney += news.value;
                    actionMsg = `穿越傳送門：「${news.text}」`;
                    break;
                case 'taxi':
                    const taxiFare = 100 * dice;
                    newMoney -= taxiFare;
                    actionMsg = `搭乘計程車，支付車資 ${taxiFare} 元`;
                    break;
                case 'start':
                    newMoney += 200000;
                    actionMsg = `回到總部高塔！領取補給金 200,000 元`;
                    break;
                default:
                    actionMsg = `拜訪 ${tile.name}，觀察局勢一回合。`;
            }

            addLog(`<span class="font-bold ${turn===0?'text-blue-600':'text-rose-600'}">[${currentPlayer.name}]</span> 擲出 ${dice} 步，進入「${tile.name}」。<br><span class="text-slate-600 text-[13px]">${actionMsg}</span>`);

            currentPlayer.pos = targetPos;
            currentPlayer.money = newMoney;
            currentPlayer.role = newRole;

            turn = turn === 0 ? 1 : 0;
            
            updateDOM();
            isAnimating = false; 
        }

        // ==========================================
        // 4. DOM (HTML 畫面) 更新
        // ==========================================
        function addLog(msg) {
            logs.unshift(msg);
            if (logs.length > 20) logs.pop();
            const container = document.getElementById('logs-container');
            container.innerHTML = '';
            logs.forEach((log, index) => {
                const div = document.createElement('div');
                div.className = `p-2 rounded-lg bg-white/50 border ${index === 0 ? 'border-teal-300 shadow-sm' : 'border-transparent opacity-70'} mb-1`;
                div.innerHTML = log;
                container.appendChild(div);
            });
        }

        function updateDOM() {
            document.getElementById('player0-money').innerText = `$${players[0].money.toLocaleString()}`;
            document.getElementById('player1-money').innerText = `$${players[1].money.toLocaleString()}`;
            document.getElementById('player0-role').innerText = players[0].role;
            document.getElementById('player1-role').innerText = players[1].role;

            const c0 = document.getElementById('player0-card');
            const c1 = document.getElementById('player1-card');
            const ind = document.getElementById('turn-indicator');

            if (turn === 0) {
                c0.className = "glass-panel rounded-2xl p-3 flex-1 md:w-48 transition-all duration-300 border-2 border-blue-400 transform scale-105";
                c1.className = "glass-panel rounded-2xl p-3 flex-1 md:w-48 transition-all duration-300 border-2 border-transparent opacity-70 scale-100";
                ind.className = "bg-blue-500 text-white px-4 py-1 rounded-full text-sm font-bold shadow-[0_4px_15px_rgba(59,130,246,0.5)] mb-3 animate-bounce";
                ind.innerText = "輪到 影狼 回合";
            } else {
                c0.className = "glass-panel rounded-2xl p-3 flex-1 md:w-48 transition-all duration-300 border-2 border-transparent opacity-70 scale-100";
                c1.className = "glass-panel rounded-2xl p-3 flex-1 md:w-48 transition-all duration-300 border-2 border-rose-400 transform scale-105";
                ind.className = "bg-rose-500 text-white px-4 py-1 rounded-full text-sm font-bold shadow-[0_4px_15px_rgba(244,63,94,0.5)] mb-3 animate-bounce";
                ind.innerText = "輪到 夜貓 回合";
            }
        }

        // ==========================================
        // 5. 渲染迴圈
        // ==========================================
        function animate() {
            requestAnimationFrame(animate);
            if (controls) controls.update();
            
            // 讓特定物件 (如金幣、珠寶) 自轉
            scene.traverse((obj) => {
                if (obj.name === "floatingGem") {
                    obj.rotation.y += 0.02;
                }
            });

            // ⭐ 讓雲朵緩慢飄動
            if (typeof clouds !== 'undefined') {
                clouds.forEach(cloud => {
                    cloud.position.x += 0.03; // 向右飄
                    if (cloud.position.x > 45) { // 飄出邊界後回到左側
                        cloud.position.x = -45;
                    }
                });
            }
            
            renderer.render(scene, camera);
        }

        window.onload = () => {
            lucide.createIcons();
            init3D();
            addLog(logs[0]); 
            updateDOM();
        };
    </script>
</body>
